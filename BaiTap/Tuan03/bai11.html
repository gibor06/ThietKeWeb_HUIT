<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài 11 tuần 03</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f9f9f9;
      }

      .register-container {
        width: 450px;
        background-color: white;
        border: 1px solid #ccc;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
      }

      .header {
        background-color: #00d4ff; /* Màu xanh Cyan */
        color: black;
        text-align: center;
        padding: 15px;
        font-weight: bold;
        font-size: 24px;
        text-transform: uppercase;
      }

      .form-content {
        padding: 20px 30px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="tel"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #999;
        box-sizing: border-box;
        outline: none;
      }

      .input-special {
        position: relative;
      }

      .footer-btn {
        text-align: center;
        margin-top: 20px;
      }

      button {
        background-color: #00d4ff;
        border: 1px solid #00b8e6;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
      }

      button:active {
        box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <div class="header">Đăng Ký Tài Khoản</div>

      <form class="form-content">
        <div class="form-group">
          <label>Tên</label>
          <input type="text" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" />
        </div>

        <div class="form-group">
          <label>Mật Khẩu</label>
          <input type="password" />
        </div>

        <div class="form-group">
          <label>Xác nhận Mật Khẩu</label>
          <input type="password" />
        </div>

        <div class="form-group">
          <label>Số Điện Thoại</label>
          <input type="tel" />
        </div>

        <div class="form-group">
          <label>Nhập địa chỉ</label>
          <input type="text" />
        </div>

        <div class="footer-btn">
          <button type="submit">TẠO TÀI KHOẢN</button>
        </div>
      </form>
    </div>
  </body>
</html>
