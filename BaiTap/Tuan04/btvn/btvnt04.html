<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuần 04 - BTVN</title>
    <style>
      #wrapper {
        width: 1000px;
        margin: 0 auto;
        font-family: Arial, sans-serif;
        font-weight: bold;
      }

      header,
      #banner,
      #navigation,
      footer {
        width: 100%;
        padding: 30px 0;
        text-align: center;
      }

      header {
        background-color: #e6e6e6;
        font-size: 40px;
      }

      #banner {
        background-color: #ccffff;
        padding: 40px 0;
      }

      #navigation {
        background-color: #99cccc;
        padding: 20px 0;
      }

      #main-content {
        width: 100%;
      }

      .menu-sidebar {
        float: left;
        width: 250px;
        height: 300px;
        background-color: #a6a6a6;
        padding: 10px;
      }

      .content {
        float: left;
        width: 500px;
        height: 300px;
        background-color: #bfbfbf;
        padding: 10px;
      }

      .sidebar-qc {
        float: left;
        width: 250px;
        height: 300px;
        background-color: #d2d2d2;
        padding: 10px;
      }

      footer {
        background-color: #f2f2f2;
        padding: 15px 0;
      }

      .clear {
        clear: both;
      }

      aside,
      article {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="wrapper">
      <header>Header</header>

      <div id="banner">Banner</div>

      <nav id="navigation">Navigation</nav>

      <div id="main-content">
        <aside class="menu-sidebar">Menu Side bar</aside>

        <article class="content">Content</article>

        <aside class="sidebar-qc">Sidebar QC</aside>

        <div class="clear"></div>
      </div>

      <footer>Footer</footer>
    </div>
  </body>
</html>
