<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuần 04- Bài 2</title>
    <style>
      header {
        background-color: #666;
        color: white;
        text-align: center;
        padding: 40px;
        font-size: 35px;
      }

      .main-body {
        display: flex;
      }

      nav {
        flex: 3;
        background-color: #ccc;
        padding: 20px;
      }

      nav ul {
        list-style-type: none;
        padding: 0;
      }

      article {
        flex: 7;
        background-color: #f1f1f1;
        padding: 20px;
      }

      footer {
        background-color: #777;
        padding: 10px;
        text-align: center;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>CITIES</header>

      <div class="main-body">
        <nav>
          <ul>
            <li><a href="#">London</a></li>
            <li><a href="#">Paris</a></li>
            <li><a href="#">Tokyo</a></li>
          </ul>
        </nav>

        <article>
          <h2>London</h2>
          <p>
            London is the capital city of England. It is the most populous city
            in the United Kingdom...
          </p>
          <p>
            Standing on the River Thames, London has been a major settlement for
            two millennia...
          </p>
        </article>
      </div>

      <footer>Contact information</footer>
    </div>
  </body>
</html>
